[[exercises]]
name = "41_quick_sort"
title = "快速排序实现"
unit = "unit2"
lesson = 41
order = 89
mode = "stdout"
source = "41_quick_sort.c"
lesson_url = "https://cnb.cool/q.qq/opencamp-c-2026-summer/Unit-2-C-Essentials/-/tree/main/lessons/41_quick_sort"
hint = '''
快排 = Lomuto 分区 + 递归快排。

    int partition(int arr[], int lo, int hi) {
        int pivot = arr[hi];       /* 选最后一个元素为 pivot */
        int i = lo - 1;            /* i: 小于等于区的右边界 */
        for (int j = lo; j < hi; j++) {
            if (arr[j] <= pivot) {
                i++;
                swap(&arr[i], &arr[j]);
            }
        }
        swap(&arr[i + 1], &arr[hi]);  /* pivot 归位 */
        return i + 1;                 /* pivot 位置 */
    }

    void quicksort(int arr[], int lo, int hi) {
        if (lo >= hi) return;                /* 终止条件 */
        int p = partition(arr, lo, hi);      /* 分区 */
        quicksort(arr, lo, p - 1);           /* 左半 */
        quicksort(arr, p + 1, hi);           /* 右半 */
    }

时间复杂度: 平均 O(n log n), 最坏 O(n^2)
空间复杂度: O(log n) 递归栈（原地排序）

partition(Lomuto 方案)思考:
- pivot 选谁？(arr[hi])
- i 的初始值？(lo-1，表示"小于等于区"的右边界)
- j 从哪到哪扫描？(lo 到 hi-1)
- arr[j] <= pivot 时做什么？(i++，交换 arr[i] 和 arr[j])
- 最后 pivot 放哪里？(i+1 位置，交换 arr[i+1] 和 arr[hi])

quicksort 递归:
- 终止条件？(lo >= hi)
- 分区后递归哪两段？(lo..p-1 和 p+1..hi)

参考: 本课 README 中的分区图解。
'''

[[exercises.cases]]
stdin = "5 3 8 1 4 2\n"
stdout = "1 2 3 4 5 8\n"

[[exercises.cases]]
stdin = "9 1 5 3 7\n"
stdout = "1 3 5 7 9\n"
