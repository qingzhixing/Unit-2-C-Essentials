[[exercises]]
name = "43_strtok_r"
title = "strtok_r 线程安全字符串切分"
unit = "unit2"
lesson = 43
order = 91
mode = "stdout"
source = "43_strtok_r.c"
lesson_url = "https://cnb.cool/q.qq/opencamp-c-2026-summer/Unit-2-C-Essentials/-/tree/main/lessons/43_strtok_r"
hint = '''
strtok_r 是 strtok 的线程安全版本。

    char *saveptr;

    /* 分隔符: " \t" = 空格 + 制表符，strtok_r 自动跳过连续分隔符 */
    char *token = strtok_r(line, " \t", &saveptr);
    while (token) {
        argv[argc++] = token;
        token = strtok_r(NULL, " \t", &saveptr);
    }

    printf("argc: %d\n", argc);
    for (int i = 0; i < argc; i++)
        printf("argv[%d]: %s\n", i, argv[i]);

关键理解:
1. strtok_r 自动跳过连续分隔符 → 不会产生空串 token
2. 分隔符字符串 " \t" 表示空格或 tab 都算分隔符
3. 找到分隔符后替换为 '\0'，字符串被原地修改
4. saveptr 保存下一次扫描的起点

strtok 为什么不是线程安全的？
- strtok 内部用 static char * 保存切分位置（全局唯一）
- 多线程同时调用会互相覆盖 → 线程不安全
- strtok_r 的 saveptr 由调用者提供 → 每线程独立 → 线程安全

思考:
- strtok_r 的第三个参数 saveptr 是什么？(保存切分位置的上下文)
- 首次调用和后续调用有什么区别？(首次传字符串，后续传 NULL)
- 分隔符参数怎么写？(字符串，每个字符都是分隔符，如 " 	")
- strtok_r 会不会产生空 token？(不会，自动跳过连续分隔符)

strtok 为什么不线程安全？(内部用 static 变量保存状态)
如果把字符串常量传给 strtok_r 会怎样？(段错误！因为要修改原字符串)

参考: man strtok_r。
'''

[[exercises.cases]]
stdin = "ls -l -a /tmp\n"
stdout = """argc: 4
argv[0]: ls
argv[1]: -l
argv[2]: -a
argv[3]: /tmp
"""

[[exercises.cases]]
stdin = "echo   hello\n"
stdout = """argc: 2
argv[0]: echo
argv[1]: hello
"""

[[exercises.cases]]
stdin = "gcc\t-Wall\tmain.c\n"
stdout = """argc: 3
argv[0]: gcc
argv[1]: -Wall
argv[2]: main.c
"""
